# ============================================================================
# Render Blueprint — DispatchMind
# https://render.com/docs/blueprint-spec
# ============================================================================
services:
  - type: web
    name: dispatchmind
    runtime: python
    region: singapore
    plan: free
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL
        fromDatabase:
          name: dispatchmind-db
          property: connectionString
      - key: DISPATCHMIND_CACHE
        value: data/processed/demo_sample.parquet
      - key: DISPATCHMIND_CSV
        value: jan to may police violation_anonymized791b166.csv
      - key: DISPATCHMIND_COORDS
        value: data/external/junction_coords.json

databases:
  - name: dispatchmind-db
    region: singapore
    plan: free
    databaseName: dispatchmind
    ipAllowList: []
